<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Home</title>
  <style>
    /* 🌿 General page styling */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    /* 🌼 Header styling */
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    /* ✨ Subtext */
    p {
      font-size: 1.2rem;
      max-width: 500px;
      margin-bottom: 30px;
    }

    /* 🌸 Button style */
    a.button {
      background-color: #fff;
      color: #5563DE;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    a.button:hover {
      background-color: #5563DE;
      color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    /* 🌙 Small footer */
    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>Welcome to Our Website 🌟</h1>
  <p>We’re happy to have you here! Start exploring or log in to continue your journey with us.</p>
  <!-- <a href="/login" class="button">Login</a> -->

  <footer>© 2025 My Website — Made with ❤️</footer>
</body>
</html>
