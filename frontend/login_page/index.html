<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>PingPong Auth</title>
</head>

<body class="bg-black text-white flex flex-col md:flex-row items-center justify-center min-h-screen px-6 md:px-20">

  <!-- LOGIN PAGE -->
  <div id="login-page" class="bg-black/40 backdrop-blur-md rounded-2xl shadow-lg border border-gray-700 px-8 py-8 md:px-10 md:py-10 w-full max-w-sm md:w-[320px] flex flex-col justify-between mb-10 md:mb-0">
    <div>
      <h2 class="text-2xl md:text-3xl font-bold mb-2">Login</h2>
      <p class="text-gray-400 mb-6 text-sm md:text-base">Glad you're back!</p>

      <div class="space-y-4">
        <input type="text" placeholder="Username" class="w-full p-3 bg-transparent rounded-xl outline-none border border-gray-700 focus:border-[#E64249] transition" />
        <input type="password" placeholder="Password" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
      </div>

      <div class="flex items-center mt-3">
        <input type="checkbox" id="remember" class="mr-2 accent-[#E64249]" />
        <label for="remember" class="text-gray-300 text-sm">Remember me</label>
      </div>

      <button class="w-full bg-gradient-to-r from-[#9E3234] via-[#D8585E] to-[#E64249] text-white py-2 rounded-md mt-4 hover:opacity-90 transition">
        Login
      </button>

      <p class="text-center text-gray-400 text-sm mt-3 cursor-pointer hover:text-white" onclick="showPage('forgot-page')">
        Forgot password?
      </p>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <hr class="flex-grow border-gray-700" />
        <span class="text-gray-500 text-sm mx-3">or</span>
        <hr class="flex-grow border-gray-700" />
      </div>

      <!-- Social Buttons -->
      <div class="flex items-center justify-center gap-6">
        <button class="w-9 h-9 bg-black/40 rounded-full flex items-center justify-center cursor-pointer">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" class="w-9 h-9" />
        </button>
        <button class="w-9 h-9 bg-gray-800 rounded-full flex items-center justify-center cursor-pointer">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" class="w-9 h-9 invert" />
        </button>
      </div>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      Don't have an account?
      <span class="text-[#E64249] cursor-pointer hover:underline" onclick="showPage('signup-page')">Sign up</span>
    </p>
  </div>

  <!-- SIGNUP PAGE -->
  <div id="signup-page" class="hidden bg-black/40 backdrop-blur-md rounded-2xl shadow-lg border border-gray-700 px-8 py-8 md:px-10 md:py-10 w-full max-w-sm md:w-[320px] flex flex-col justify-between mb-10 md:mb-0">
    <div>
      <h2 class="text-2xl md:text-3xl font-bold mb-4">Sign Up</h2>

      <div class="space-y-4">
        <input type="text" placeholder="Username" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
        <input type="email" placeholder="Email" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
        <input type="text" placeholder="Confirm Email" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
        <input type="password" placeholder="Password" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
      </div>

      <button class="w-full bg-gradient-to-r from-[#9E3234] via-[#D8585E] to-[#E64249] text-white py-2 rounded-md mt-6 hover:opacity-90 transition">
        Sign Up
      </button>

      <div class="flex items-center my-6">
        <hr class="flex-grow border-gray-700" />
        <span class="text-gray-500 text-sm mx-3">or</span>
        <hr class="flex-grow border-gray-700" />
      </div>

      <div class="flex items-center justify-center gap-6">
        <button class="w-9 h-9 bg-black/40 rounded-full flex items-center justify-center cursor-pointer">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" class="w-9 h-9" />
        </button>
        <button class="w-9 h-9 bg-gray-800 rounded-full flex items-center justify-center cursor-pointer">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" class="w-9 h-9 invert" />
        </button>
      </div>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      Already have an account?
      <span class="text-[#E64249] cursor-pointer hover:underline" onclick="showPage('login-page')">Login</span>
    </p>
  </div>

  <!-- FORGOT PASSWORD PAGE -->
  <div id="forgot-page" class="hidden bg-black/40 backdrop-blur-md rounded-2xl shadow-lg border border-gray-700 px-8 py-8 md:px-10 md:py-10 w-full max-w-sm h-auto md:h-[550px] flex flex-col justify-between mb-10 md:mb-0">
    <div>
      <h2 class="text-2xl md:text-3xl font-bold mb-2">Forgot Password?</h2>
      <div class="space-y-4 mt-6">
        <input type="email" placeholder="Email" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
      </div>

      <button class="w-full bg-gradient-to-r from-[#9E3234] via-[#D8585E] to-[#E64249] text-white py-2 rounded-md mt-6 hover:opacity-90 transition">
        Reset Password
      </button>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      Don’t have an account?
      <span class="text-[#E64249] cursor-pointer hover:underline" onclick="showPage('signup-page')">Sign up</span>
    </p>
  </div>

  <!-- CHANGE PASSWORD PAGE -->
  <div id="change-page" class="hidden bg-black/40 backdrop-blur-md rounded-2xl shadow-lg border border-gray-700 px-8 py-8 md:px-10 md:py-10 w-full max-w-sm md:h-[550px] md:w-[320px] mb-10 md:mb-0">
    <div>
      <h2 class="text-2xl md:text-3xl font-bold mb-4">Change Password</h2>
      <div class="space-y-4">
        <input type="password" placeholder="Password" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
        <input type="password" placeholder="Confirm Password" class="w-full p-3 bg-transparent rounded-xl border border-gray-700 focus:border-[#E64249]" />
      </div>

      <button class="w-full bg-gradient-to-r from-[#9E3234] via-[#D8585E] to-[#E64249] text-white py-2 rounded-md mt-6 hover:opacity-90 transition">
        Change Password
      </button>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6 cursor-pointer hover:text-white" onclick="showPage('login-page')">
      Back to Login
    </p>
  </div>

  <!-- Right: Shared Image -->
  <div class="flex items-center justify-center md:ml-10">
    <img id="page-image" src="images/pingpong2.jpg" alt="Athlete" class="w-[80%] md:w-[500px] object-contain rounded-xl hidden sm:block" />
  </div>

  <script src="index.js"></script>
</body>
</html>
