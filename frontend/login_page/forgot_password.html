<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Login Page</title>
</head>

<body class="bg-black text-white flex flex-col md:flex-row items-center justify-center min-h-screen px-6 md:px-20">
  <!-- Left: Login Form -->
  <div class="bg-black/40 backdrop-blur-md rounded-2xl shadow-lg border border-gray-700 px-8 py-8 md:px-10 md:py-10 w-full max-w-sm h-auto md:h-[550px] flex flex-col justify-between mb-10 md:mb-0">
    
    <!-- Top content -->
    <div>
      <h2 class="text-2xl md:text-3xl font-bold mb-2">Forgot Password?</h2>

      <div class="space-y-4 mt-6">
        <input type="email" placeholder="Email"
          class="w-full p-3 bg-transparent rounded-xl outline-none border border-gray-700 focus:border-[#E64249] transition text-sm md:text-base" />
      </div>

      <button
        class="w-full bg-gradient-to-r from-[#9E3234] via-[#D8585E] to-[#E64249] text-white py-2 rounded-md mt-6 hover:opacity-90 transition text-sm md:text-base">
        Reset Password
      </button>
    </div>

    <!-- Bottom: Moved to footer position -->
    <p class="text-center text-gray-400 text-sm mt-6">
      Don't have an account?
      <span class="text-[#E64249] cursor-pointer hover:underline">Sign up</span>
    </p>
  </div>

  <!-- Right: Illustration -->
  <div class="flex items-center justify-center md:ml-10">
    <img src="images/pingpong1.jpg" alt="Athlete"
      class="w-[80%] md:w-[500px] object-contain rounded-xl hidden sm:block" />
  </div>
</body>
</html>
