server {
    listen 80;
    server_name localhost;

    # Path to your SPA (the same place you copy your files to in Docker)
    root /usr/share/nginx/html;
    index index.html;

    # Main rule: always serve index.html if the file is not found
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow access to your images and static files
    location /images/ {
        autoindex on;
    }

    # Optional: better error pages
    error_page 403 404 /index.html;
}
