<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Sign Up Page</title>
</head>

<body class="bg-black text-white flex flex-col md:flex-row items-center justify-center min-h-screen px-6 md:px-20 gap-10">
  <!-- Left: Sign Up Form -->
  <div class="bg-black/40 backdrop-blur-md flex flex-col rounded-2xl shadow-lg border border-gray-700 px-8 py-8 md:px-10 md:py-10 w-full max-w-sm md:w-[320px] mb-10 md:mb-0">
    <div>
      <h2 class="text-2xl md:text-3xl font-bold mb-4">Sign Up</h2>

      <div class="space-y-4">
        <input type="text" placeholder="Username"
          class="w-full p-3 bg-transparent rounded-xl outline-none border border-gray-700 focus:border-[#E64249] transition text-sm md:text-base" />
        <input type="email" placeholder="Email"
          class="w-full p-3 bg-transparent rounded-xl outline-none border border-gray-700 focus:border-[#E64249] transition text-sm md:text-base" />
        <input type="text" placeholder="Confirm Email"
          class="w-full p-3 bg-transparent rounded-xl outline-none border border-gray-700 focus:border-[#E64249] transition text-sm md:text-base" />
        <input type="password" placeholder="Password"
          class="w-full p-3 bg-transparent rounded-xl outline-none border border-gray-700 focus:border-[#E64249] transition text-sm md:text-base" />
      </div>

      <button
        class="w-full bg-gradient-to-r from-[#9E3234] via-[#D8585E] to-[#E64249] text-white py-2 rounded-md mt-6 hover:opacity-90 transition text-sm md:text-base">
        Sign Up
      </button>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <hr class="flex-grow border-gray-700" />
        <span class="text-gray-500 text-sm mx-3">or</span>
        <hr class="flex-grow border-gray-700" />
      </div>

      <!-- Social Buttons -->
      <div class="flex items-center justify-center gap-6">
        <button class="w-9 h-9 bg-black/40 rounded-full flex items-center justify-center cursor-pointer">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" class="w-9 h-9" />
        </button>
        <button class="w-9 h-9 bg-gray-800 rounded-full flex items-center justify-center cursor-pointer">
          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub" class="w-9 h-9 invert" />
        </button>
      </div>
    </div>

    <!-- Bottom: Login link -->
    <p class="text-center text-gray-400 text-sm mt-6">
      Already have an account?
      <span class="text-[#E64249] cursor-pointer hover:underline">Login</span>
    </p>
  </div>

  <!-- Right: Illustration -->
  <div class="flex items-center justify-center md:ml-10">
    <img src="images/pingpong1.jpg" alt="Athlete"
      class="w-[80%] md:w-[500px] object-contain rounded-xl hidden sm:block" />
  </div>
</body>
</html>
