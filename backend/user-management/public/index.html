<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Testing Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { color: #667eea; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h2 { color: #667eea; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; }
        input[type="text"], input[type="email"], input[type="password"], input[type="file"], input[type="number"], textarea {
            width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 5px; font-size: 14px; transition: border-color 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 100px; }
        button {
            background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 5px;
            cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.3s; width: 100%;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-danger { background: #dc3545; } .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; } .btn-success:hover { background: #218838; }
        .response {
            margin-top: 15px; padding: 15px; border-radius: 5px; font-size: 14px; word-wrap: break-word; display: none;
        }
        .response.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .response.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .profile-display { background: #f8f9fa; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        .profile-display img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        .profile-info { margin-bottom: 10px; }
        .profile-info strong { color: #667eea; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-box { background: white; padding: 10px; border-radius: 5px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; }
        .friend-list { list-style: none; padding: 0; }
        .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 5px; margin-bottom: 10px; }
        .friend-info { display: flex; align-items: center; gap: 10px; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status-online { background: #28a745; }
        .status-offline { background: #6c757d; }
        .search-results { margin-top: 15px; }
        .user-card { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-small { padding: 6px 12px; font-size: 12px; width: auto; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎮 User Profile Testing Interface</h1>
            <p>Test all profile functionalities for your API</p>
        </div>

        <!-- Create Profile Section -->
        <div class="card">
            <h2>🆕 Create Profile</h2>
            <form onsubmit="createProfile(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="create-username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="create-email" required>
                </div>
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="create-displayname" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="create-password" required>
                </div>
                <button type="submit" class="btn-success">Create Profile</button>
            </form>
            <div class="response" id="create-response"></div>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Profile Display -->
            <div class="card">
                <h2>👤 My Profile</h2>
                <div id="profile-display" class="profile-display">
                    <p style="text-align: center; color: #999;">No profile loaded yet</p>
                </div>
                <button onclick="getMyProfile()">Refresh Profile</button>
                <div class="response" id="profile-response"></div>
            </div>

            <!-- Update Profile -->
            <div class="card">
                <h2>✏️ Update Profile</h2>
                <form onsubmit="updateProfile(event)">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="update-displayname" placeholder="New display name">
                    </div>
                    <div class="form-group">
                        <label>Bio</label>
                        <textarea id="update-bio" placeholder="Tell us about yourself..."></textarea>
                    </div>
                    <button type="submit">Update Profile</button>
                </form>
                <div class="response" id="update-response"></div>
            </div>

            <!-- Upload Avatar -->
            <div class="card">
                <h2>📸 Upload Avatar</h2>
                <form onsubmit="uploadAvatar(event)">
                    <div class="form-group">
                        <label>Choose Image</label>
                        <input type="file" id="avatar-file" accept="image/*">
                    </div>
                    <button type="submit">Upload Avatar</button>
                </form>
                <div class="response" id="avatar-response"></div>
            </div>
        </div>

        <!-- Friends Section -->
        <div class="grid">
            <!-- Search Users -->
            <div class="card">
                <h2>🔍 Search Users</h2>
                <div class="form-group">
                    <input type="text" id="search-query" placeholder="Search by display name...">
                </div>
                <button onclick="searchUsers()">Search</button>
                <div class="search-results" id="search-results"></div>
                <div class="response" id="search-response"></div>
            </div>

            <!-- Friend Requests -->
            <div class="card">
                <h2>📬 Friend Requests</h2>
                <button onclick="getPendingRequests()">Refresh Requests</button>
                <div id="pending-requests" style="margin-top: 15px;"></div>
                <div class="response" id="requests-response"></div>
            </div>

            <!-- Friends List -->
            <div class="card">
                <h2>👥 My Friends</h2>
                <button onclick="getFriends()">Refresh Friends</button>
                <div id="friends-list" style="margin-top: 15px;"></div>
                <div class="response" id="friends-response"></div>
            </div>
        </div>

        <!-- View Other Profile -->
        <div class="card">
            <h2>🔎 View User Profile</h2>
            <div class="form-group">
                <label>User ID</label>
                <input type="number" id="view-user-id" placeholder="Enter user ID">
            </div>
            <button onclick="viewUserProfile()">View Profile</button>
            <div id="other-profile-display" style="margin-top: 15px;"></div>
            <div class="response" id="view-response"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        function showResponse(id, message, isError = false) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.className = 'response ' + (isError ? 'error' : 'success');
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function createProfile(event) {
            event.preventDefault();
            const username = document.getElementById('create-username').value;
            const email = document.getElementById('create-email').value;
            const displayName = document.getElementById('create-displayname').value;
            const password = document.getElementById('create-password').value;

            try {
                const response = await fetch(`${API_URL}/profile/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, displayName, password })
                });
                const data = await response.json();
                if (response.ok) {
                    showResponse('create-response', '✅ Profile created successfully!');
                    getMyProfile();
                } else {
                    showResponse('create-response', data.error || 'Failed to create profile', true);
                }
            } catch (error) {
                showResponse('create-response', 'Error: ' + error.message, true);
            }
        }

        async function getMyProfile() {
            try {
                const response = await fetch(`${API_URL}/profile`);
                const data = await response.json();
                if (response.ok) {
                    displayProfile(data.profile, 'profile-display');
                    showResponse('profile-response', 'Profile loaded');
                } else {
                    showResponse('profile-response', data.error || 'Failed to load profile', true);
                }
            } catch (error) {
                showResponse('profile-response', 'Error: ' + error.message, true);
            }
        }

        function displayProfile(profile, elementId) {
            const html = `
                <img src="${profile.avatar_url || '/avatars/default.png'}" alt="Avatar">
                <div class="profile-info"><strong>Display Name:</strong> ${profile.display_name}</div>
                <div class="profile-info"><strong>Username:</strong> ${profile.username}</div>
                <div class="profile-info"><strong>Email:</strong> ${profile.email}</div>
                <div class="profile-info"><strong>Bio:</strong> ${profile.bio || 'No bio yet'}</div>
            `;
            document.getElementById(elementId).innerHTML = html;
        }

        async function updateProfile(event) {
            event.preventDefault();
            const displayName = document.getElementById('update-displayname').value;
            const bio = document.getElementById('update-bio').value;
            const updates = {};
            if (displayName) updates.displayName = displayName;
            if (bio) updates.bio = bio;

            try {
                const response = await fetch(`${API_URL}/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                const data = await response.json();
                if (response.ok) {
                    showResponse('update-response', 'Profile updated!');
                    getMyProfile();
                } else {
                    showResponse('update-response', data.error || 'Failed to update', true);
                }
            } catch (error) {
                showResponse('update-response', 'Error: ' + error.message, true);
            }
        }

        async function uploadAvatar(event) {
            event.preventDefault();
            const file = document.getElementById('avatar-file').files[0];
            if (!file) return showResponse('avatar-response', 'Please select a file', true);

            const formData = new FormData();
            formData.append('avatar', file);

            try {
                const response = await fetch(`${API_URL}/profile/avatar`, { method: 'POST', body: formData });
                const data = await response.json();
                if (response.ok) {
                    showResponse('avatar-response', 'Avatar uploaded!');
                    getMyProfile();
                } else {
                    showResponse('avatar-response', data.error || 'Failed to upload', true);
                }
            } catch (error) {
                showResponse('avatar-response', 'Error: ' + error.message, true);
            }
        }

        async function searchUsers() {
            const query = document.getElementById('search-query').value;
            if (query.length < 2) return showResponse('search-response', 'Enter at least 2 characters', true);
            try {
                const response = await fetch(`${API_URL}/profile/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (response.ok) {
                    displaySearchResults(data.users);
                    showResponse('search-response', `Found ${data.users.length} users`);
                } else {
                    showResponse('search-response', data.error || 'Search failed', true);
                }
            } catch (error) {
                showResponse('search-response', 'Error: ' + error.message, true);
            }
        }

        function displaySearchResults(users) {
            const container = document.getElementById('search-results');
            if (users.length === 0) {
                container.innerHTML = '<p style="color:#999;text-align:center;">No users found</p>';
                return;
            }
            container.innerHTML = users.map(user => `
                <div class="user-card">
                    <div>
                        <strong>${user.display_name}</strong>
                        <div style="font-size:12px;color:#666;">@${user.username}</div>
                    </div>
                    <button class="btn-small btn-success" onclick="sendFriendRequest(${user.id})">Add Friend</button>
                </div>
            `).join('');
        }

        async function sendFriendRequest(friendId) {
            await fetch(`${API_URL}/friends/request`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ friendId })
            });
            alert('Friend request sent');
        }

        async function getPendingRequests() {
            const res = await fetch(`${API_URL}/friends/requests`);
            const data = await res.json();
            if (res.ok) displayPendingRequests(data.requests);
        }

        function displayPendingRequests(reqs) {
            const c = document.getElementById('pending-requests');
            if (reqs.length === 0) return c.innerHTML = '<p style="color:#999;text-align:center;">No pending requests</p>';
            c.innerHTML = reqs.map(r => `
                <div class="user-card">
                    <div><strong>${r.display_name}</strong><div style="font-size:12px;color:#666;">@${r.username}</div></div>
                    <div>
                        <button class="btn-small btn-success" onclick="acceptFriendRequest(${r.id})">Accept</button>
                        <button class="btn-small btn-danger" onclick="rejectFriendRequest(${r.id})">Reject</button>
                    </div>
                </div>
            `).join('');
        }

        async function acceptFriendRequest(id) {
            await fetch(`${API_URL}/friends/accept`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ friendId: id }) });
            getPendingRequests();
            getFriends();
        }

        async function rejectFriendRequest(id) {
            await fetch(`${API_URL}/friends/${id}`, { method: 'DELETE' });
            getPendingRequests();
        }

        async function getFriends() {
            const res = await fetch(`${API_URL}/friends`);
            const data = await res.json();
            if (res.ok) displayFriends(data.friends);
        }

        function displayFriends(friends) {
            const c = document.getElementById('friends-list');
            if (friends.length === 0) return c.innerHTML = '<p style="color:#999;text-align:center;">No friends yet</p>';
            c.innerHTML = `<ul class="friend-list">${friends.map(f => `
                <li class="friend-item">
                    <div class="friend-info">
                        <span class="status-indicator status-${f.online_status}"></span>
                        <div><strong>${f.display_name}</strong><div style="font-size:12px;color:#666;">@${f.username}</div></div>
                    </div>
                    <button class="btn-small btn-danger" onclick="removeFriend(${f.id})">Remove</button>
                </li>
            `).join('')}</ul>`;
        }

        async function removeFriend(id) {
            if (!confirm('Remove this friend?')) return;
            await fetch(`${API_URL}/friends/${id}`, { method: 'DELETE' });
            getFriends();
        }

        async function viewUserProfile() {
            const id = document.getElementById('view-user-id').value;
            if (!id) return showResponse('view-response', 'Enter a user ID', true);
            const res = await fetch(`${API_URL}/profile/${id}`);
            const data = await res.json();
            if (res.ok) displayProfile(data.profile, 'other-profile-display');
            else showResponse('view-response', data.error || 'Failed to load', true);
        }

        getMyProfile();
    </script>
</body>
</html>
