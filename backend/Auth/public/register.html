<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="login.css"> <!-- reuse the same CSS -->

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="login-card">
    <h2>Register</h2>
    <form action="api/auth/signup" method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit">Register</button>
    </form>
    <div class="social-login">
      <button class="social-btn google-btn" onclick="window.location.href='/api/auth/google'">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo">
        Login with Gmail
      </button>

      <button class="social-btn github-btn" onclick="window.location.href='/api/auth/github'">
        <img src="https://www.svgrepo.com/show/512317/github-142.svg" alt="GitHub logo">
        Login with GitHub
      </button>

    <!-- Login link/icon -->
    <p class="login-link">
      <i class="fa-solid fa-right-to-bracket"></i>
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>
</body>

</html>
