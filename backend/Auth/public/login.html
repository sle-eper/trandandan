<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/Auth/public/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="login-card">
    <h2>Login</h2>

    <form action="/api/auth/login" method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="social-login">
      <button class="social-btn google-btn" onclick="window.location.href='/api/auth/google'">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo"class="oauth-icon">
        Login with Gmail
      </button>

      <button class="social-btn github-btn" onclick="window.location.href='/api/auth/github'">
        <img src="https://www.svgrepo.com/show/512317/github-142.svg" alt="GitHub logo" class="oauth-icon">
        Login with GitHub
      </button>
    </div>

    <p class="login-link">
      <i class="fa-solid fa-user-plus"></i>
      Don’t have an account?
      <a href="register.html">Register</a>
    </p>
  </div>
</body>
</html>
