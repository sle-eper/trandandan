<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Reset & basics */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Card */
    .login-card {
      background-color: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 360px;
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 20px;
      color: #333;
    }

    /* Form inputs */
    form input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    form button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background-color: #007bff;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    form button:hover {
      background-color: #0056b3;
    }

    /* Social buttons */
    .social-login {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .google-btn {
      background-color: #db4437;
      color: white;
    }

    .google-btn:hover {
      background-color: #a33d2d;
    }

    .github-btn {
      background-color: #24292e;
      color: white;
    }

    .github-btn:hover {
      background-color: #0d1117;
    }

    /* Icons inside buttons */
    .oauth-icon {
      width: 20px;   /* Control icon size */
      height: 20px;
    }

    /* Footer link */
    .login-link {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }

    .login-link a {
      color: #007bff;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .login-link i {
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <h2>Login</h2>

    <form action="/api/auth/login" method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="social-login">
      <button class="social-btn google-btn" onclick="window.location.href='/api/auth/google'">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google logo" class="oauth-icon">
        Login with Gmail
      </button>

      <button class="social-btn github-btn" onclick="window.location.href='/api/auth/github'">
        <img src="https://www.svgrepo.com/show/512317/github-142.svg" alt="GitHub logo" class="oauth-icon">
        Login with GitHub
      </button>
    </div>

    <p class="login-link">
      <i class="fa-solid fa-user-plus"></i>
      Don’t have an account?
      <a href="/api/auth/signup">Register</a>
    </p>
  </div>
</body>
</html>
