upstream auth {
    server auth:5000;
    keepalive 32;
}

server {
    listen 8080;
    server_name localhost; 
    
    # Authentication Service
    location = /auth/verify {
        proxy_pass http://auth;           # no URI part, no trailing slash
    }   
    location /api/auth/ {
        proxy_pass http://auth;  # ✅ no port here!
        proxy_set_header Cookie $http_cookie;
    }
    location / {
        proxy_pass http://frontend:5173;  # <-- frontend container
    }

    # User Management Service
    location /api/users/ {
        auth_request /auth/verify/;
        
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user $upstream_http_x_user;
        
        proxy_set_header x-user-id $user_id;
        proxy_set_header x-user $user;
        proxy_pass http://user-management:3000/;
    }

    location /socket.io/ {
        auth_request /auth/verify/;
        
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user $upstream_http_x_user;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_pass http://chat:3000/socket.io/;
    }
    location /tournament/
    {
        auth_request /auth/verify/;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user $upstream_http_x_user;
        
        proxy_set_header x-user-id $user_id;
        proxy_set_header x-user $user;
        proxy_pass http://tournament:5500/;
    }
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

}