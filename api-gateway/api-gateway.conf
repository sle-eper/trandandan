upstream auth {
    server auth:5000;
    keepalive 32;
}
upstream frontend {
    server frontend:8443;
    keepalive 32;
}

upstream user-management {
    server user-management:3000;
    keepalive 32;
}

upstream tournament {
    server tournament:5500;
    keepalive 32;
}

upstream spy-service {
    server spy-service:3003;
    keepalive 32;
}


server {
    listen 443 ssl ;
    server_name localhost;
    client_max_body_size 5M;

    ssl_certificate /etc/nginx/certs/certificate.crt;
    ssl_certificate_key /etc/nginx/certs/private.key;
   
    ssl_protocols TLSv1.2 TLSv1.3;

    #Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
   
    # Auth Verification
    location = /auth/verify {
        proxy_pass http://auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }   

    # Authentication API
    location /api/auth/ {
        proxy_pass http://auth;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }


    # User Management Service
    location /api/users/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, x-user-id, x-user' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Length' 0;
            return 204;
       }
        auth_request /auth/verify;
        
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user $upstream_http_x_user;
        proxy_set_header x-user-id $user_id;
        proxy_set_header x-user $user;

        
        proxy_pass http://user-management/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }
    
    location /api/uploads/ {
        proxy_pass http://user-management/uploads/;
        proxy_http_version 1.1;
            
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    
    # Cache static files
    #proxy_cache_valid 200 1h;
    #add_header X-Cache-Status $upstream_cache_status;
    }

    # #chat service
    # location /api/chat/ {
    #     auth_request /auth/verify/;
        
    #     auth_request_set $user_id $upstream_http_x_user_id;
    #     auth_request_set $user $upstream_http_x_user;

    #     proxy_pass http://chat:3000;  
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
        
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto https;
    #     proxy_set_header x-user-id $user_id;
    #     proxy_set_header x-user $user;
        
    # }
    #tournament service
    location /tournament/ {
        auth_request /auth/verify;  

        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user $upstream_http_x_user;
        
        proxy_set_header x-user-id $user_id;
        proxy_set_header x-user $user;
        proxy_pass http://tournament;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }

    # Spy Service
    location /api/spy/ {
        auth_request /auth/verify;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user $upstream_http_x_user;
        proxy_set_header x-user-id $user_id;
        proxy_set_header x-user $user;

        proxy_pass http://spy-service/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
    }

    # Healthcheck
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
