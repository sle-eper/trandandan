services:

  # User Management Service
  user-management:
    build: ./backend/user-management
    container_name: user-management
    depends_on:
      - authentication
    ports:
      - "3001:3000"
    volumes:
      - ./backend/user-management/src:/usr/src/app/src
      - ./backend/user-management/data:/usr/src/app/data:rw
      - ./backend/user-management/public/avatars:/usr/src/app/public/avatars
      - /usr/src/app/node_modules
    command: npm run dev
    networks:
      - app-network

  # authentication Service
  authentication:
    build: ./backend/Auth
    container_name: auth
    ports:
      - "5000:5000"
    env_file:
      - ./backend/Auth/.env
    command: npm start
    volumes:
      - ./backend/Auth/DataBase:/Auth/DataBase
    networks:
      - app-network

  front-end:
    build: ./frontend
    container_name: frontend
    networks:
      - app-network
    volumes:
      - ./frontend/chat-frontend/src:/app/chat-frontend/src
      - ./frontend/auth_frontend/src_auth:/app/auth_frontend/src_auth
      - ./frontend/profile_frontend/src:/app/profile_frontend/src
      - ./frontend/spy_frontend/src_spy:/app/spy_frontend/src_spy
      - ./frontend/tournament_frontend/src:/app/tournament_frontend/src
      - ./frontend/game_frontend/src_game/src:/app/game_frontend/src_game/src
      - ./frontend/game_frontend/src_game/css:/app/game_frontend/src_game/css
      - /app/node_modules

    depends_on:
      - user-management
      - authentication

  spy-service:
    build: ./backend/spy-service
    container_name: spy-service
    ports:
      - "3003:3003"
    networks:
      - app-network
      # volumes:
      # - ./backend/spy-service/src_spy_service:/app:src_spy_service 

  tournament:
    build: ./backend/tournament
    container_name: tournament
    depends_on:
      - authentication
      - user-management
    volumes:
      - ./backend/tournament/data:/tournament/data
    ports:
      - "5500:5500"
    networks:
      - app-network

  chat-service:
    build: ./backend/chat-service
    container_name: chat
    ports:
      - "3000:3000"
    networks:
      - app-network
    volumes:
      - ./backend/chat-service/src:/app/src
      - /app/node_modules

  game-service:
    build: ./backend/game-service
    container_name: game-service
    ports:
      - "4000:4000"
    networks:
      - app-network
    depends_on:
      - user-management
      - authentication
    env_file:
      - ./backend/game-service/.env
    volumes:
      - ./backend/game-service/src:/usr/src/app/src
      - /usr/src/app/node_modules

  # API Gateway Service
  api-gateway:
    build: ./api-gateway
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    networks:
      - app-network
    depends_on:
      - user-management
      - authentication

networks:
  app-network:
    driver: bridge

volumes:
  nginx_certs:
    driver: local
